<style>
body { font-family: sans-serif; padding:20px; }
textarea { width:100%; height:120px; }
input { margin:4px; }

<body><h2>25깅융서버 좌표 탐색기</h2><div class="section">
<h3>! ! ! 필독 ! ! !</h3>
<textarea readonly>
1. 마인크래프트에서 북쪽은 -Z이고 남쪽은 +Z이므로 마크에서 지도를 볼 땐 그래프 상하반전을 해야 들어맞는다.

2. 키워드 검색 ---> 바이옴(초록색 또는 파란색)의 경우 가급적이면 공식 명칭을 이용함. (ex. 산-> 봉우리)
공식 명칭이 비직관적일 경우 좃대로 씀. (ex. 깊은 어둠->워든)

3. RP = Ruined Portal
빨강 = 구조물
노랑 = 마을
초록 = 바이옴
파랑 = 희귀한 바이옴 또는 식생/동물 관련
보라 = 지하 구조물/동굴 유형
검정 = 기타(플레이어 제작 구조물, 포탈 등)

이 사이트는 챗지피티에게 몇십 번을 빌고 빌어 만들었읍니다. 저는 html 거의 모륿니다. 부족한점이많읍니다
</textarea>
</div><div class="section">
<h3>좌표 검색</h3>
<input id="searchX" type="number" placeholder="x">
<input id="searchY" type="number" placeholder="z">
<button onclick="searchPoint()">검색</button>
<button onclick="showAll()">전체 보기</button>
</div><div class="section">
<h3>키워드 검색</h3>
<input id="labelInput" placeholder="예: 마을">
<button onclick="searchLabel()">레이블 검색</button>
</div><div class="section">
<label><input type="checkbox" id="toggleLabels" checked onchange="render()"> 라벨 표시</label>
<label><input type="checkbox" id="toggleLegend" onchange="render()"> 범례 표시</label>
</div><p id="result"></p>
<canvas id="chart"></canvas><script>
let chart;
let mode = 'all';
let searchCoord = null;
let labelKeyword = '';

function parsePoints(){
  return document.getElementById('pointsInput').value
    .split('\n')
    .map(line=>{
      const [x,y,label,color,shape] = line.split(',');
      return {x:+x,y:+y,label,color,shape};
    })
    .filter(p=>!isNaN(p.x)&&!isNaN(p.y));
}

function buildDatasets(points){
  return points.map(p => ({
    label: p.label || '',
    data: [{ x: p.x, y: p.y }],

    // 기존 색 유지
    pointBackgroundColor: p.color || 'black',

    // ⭐ star만 테두리 강조
    pointBorderColor: (p.shape === 'star' ? 'black' : (p.color || 'black')),
    pointBorderWidth: (p.shape === 'star' ? 2 : (p.shape === 'x' ? 2 : 0)),

    // ⭐ star만 크게
    pointRadius: (p.shape === 'star' ? 8 : undefined),

    pointStyle: (p.shape === 'x' ? 'crossRot' : (p.shape || 'circle'))
  }));
}

const labelPlugin={
  id:'labels',
  afterDatasetsDraw(chart){
    if(!document.getElementById('toggleLabels').checked) return;
    const {ctx}=chart;
    chart.data.datasets.forEach((ds,i)=>{
      const meta=chart.getDatasetMeta(i);
      meta.data.forEach(pt=>{
        ctx.fillText(ds.label, pt.x+5, pt.y-5);
      });
    });
  }
};

function createChart(datasets,xMin,xMax,yMin,yMax){
  if(chart) chart.destroy();

  chart=new Chart(document.getElementById('chart'),{
    type:'scatter',
    data:{datasets},
    options:{
      plugins:{
        legend:{
          display:document.getElementById('toggleLegend').checked,
          position:'bottom'
        }
      },
      scales:{
        x:{min:xMin,max:xMax},
        y:{min:yMin,max:yMax}
      }
    },
    plugins:[labelPlugin]
  });
}

function showAll(){
  mode='all';
  render();
}

function searchPoint(){
  const x=+searchX.value;
  const y=+searchY.value;
  if(isNaN(x)||isNaN(y)) return;
  mode='coord';
  searchCoord={x,y};
  render();
}

function searchLabel(){
  const keyword = labelInput.value;
  if(!keyword) return;
  mode='label';
  labelKeyword = keyword;
  render();
}

function render(){
  const pts=parsePoints();
  if(pts.length===0) return;

  if(mode==='all'){
    const xs=pts.map(p=>p.x);
    const ys=pts.map(p=>p.y);

    createChart(buildDatasets(pts),
      Math.min(...xs)-2,
      Math.max(...xs)+2,
      Math.min(...ys)-2,
      Math.max(...ys)+2);

    result.innerText='전체 보기';
  }

  if(mode==='coord' && searchCoord){
    const {x,y}=searchCoord;

    let nearest=pts[0];
    let minDist=Infinity;

    pts.forEach(p=>{
      const d=(p.x-x)**2+(p.y-y)**2;
      if(d<minDist){minDist=d;nearest=p;}
    });

    const d=Math.sqrt(minDist);
    const pad=Math.max(5,d*3);

    const datasets=[
      ...buildDatasets(pts),
      {
        label:'검색',
        data:[{x,y}],
        pointBackgroundColor:'black',
        pointBorderColor:'black',
        pointRadius:6
      }
    ];

    createChart(datasets,x-pad,x+pad,y-pad,y+pad);
    result.innerText=`최근접: (${nearest.x}, ${nearest.y})`;
  }

  if(mode==='label'){
    const filtered=pts.filter(p=>(p.label||'').includes(labelKeyword));

    if(filtered.length===0){
      result.innerText='검색 결과 없음';
      return;
    }

    const xs=filtered.map(p=>p.x);
    const ys=filtered.map(p=>p.y);

    createChart(buildDatasets(filtered),
      Math.min(...xs)-2,
      Math.max(...xs)+2,
      Math.min(...ys)-2,
      Math.max(...ys)+2);

    result.innerText=`"${labelKeyword}" 포함 ${filtered.length}개`;
  }
}

window.addEventListener('DOMContentLoaded', () => {
  showAll();
});
